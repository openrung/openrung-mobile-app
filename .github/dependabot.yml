# Auto-opens pin-bump PRs when the openrung repository tags a new punchcore or
# wsscore module version. Scoped to those two shared modules on purpose:
# sing-box pins its own dependency set (SINGBOX_VERSION is the source of truth
# for the native engine), so generic bumps here would fight the graft. Changes
# to go.mod/go.sum invalidate the AAR cache and exercise the Android tests.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /android/punchbridge
    schedule:
      interval: daily
    allow:
      - dependency-name: github.com/openrung/openrung/punchcore
      - dependency-name: github.com/openrung/openrung/wsscore
    commit-message:
      prefix: openrung-core
