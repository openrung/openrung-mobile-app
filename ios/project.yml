# XcodeGen spec — the source of truth for ios/OpenRung.xcodeproj (contract §7).
# Replicates the React Native 0.86 template app target as it existed in the checked-in
# pbxproj (Bundle React Native code and images phase, folly flags, -ObjC/-lc++, etc.),
# plus the PacketTunnel network-extension target ported from the production app.
# Regenerate with scripts/generate-project.sh (xcodegen generate + pod install).
name: OpenRung
options:
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Release

settings:
  base:
    # Injected from package.json by scripts/generate-project.sh (the app version string is
    # single-sourced there; check-versions.mjs enforces the baked pbxproj value matches).
    MARKETING_VERSION: "${APP_VERSION}"
    CURRENT_PROJECT_VERSION: "6"
    DEVELOPMENT_TEAM: 9VLV9A7KS9
    CODE_SIGN_STYLE: Automatic
    # The RN bundle phase writes outside the sandbox; Xcode 15+ would block it otherwise.
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    CLANG_CXX_LANGUAGE_STANDARD: "c++20"
    CLANG_CXX_LIBRARY: "libc++"
    CLANG_ENABLE_MODULES: "YES"
    GCC_C_LANGUAGE_STANDARD: gnu99
    SWIFT_VERSION: "5.0"
    LD_RUNPATH_SEARCH_PATHS:
      - /usr/lib/swift
      - "$(inherited)"
    LIBRARY_SEARCH_PATHS:
      - "\"$(SDKROOT)/usr/lib/swift\""
      - "\"$(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME)\""
      - "\"$(inherited)\""
    OTHER_CPLUSPLUSFLAGS:
      - "$(OTHER_CFLAGS)"
      - "-DFOLLY_NO_CONFIG"
      - "-DFOLLY_MOBILE=1"
      - "-DFOLLY_USE_LIBCPP=1"
      - "-DFOLLY_CFG_NO_COROUTINES=1"
      - "-DFOLLY_HAVE_CLOCK_GETTIME=1"
  configs:
    Debug:
      ENABLE_BITCODE: "NO"
      GCC_DYNAMIC_NO_PIC: "NO"
      GCC_OPTIMIZATION_LEVEL: "0"
      MTL_ENABLE_DEBUG_INFO: "YES"
    Release:
      MTL_ENABLE_DEBUG_INFO: "NO"
      VALIDATE_PRODUCT: "YES"

targets:
  OpenRung:
    type: application
    platform: iOS
    sources:
      # App sources incl. the OpenRungVpn native module, LaunchScreen, assets, privacy manifest.
      - path: OpenRung
      # Shared layer is compiled into BOTH targets (the module reads SharedConnectionState etc.).
      - path: Shared
    dependencies:
      # Embeds the PacketTunnel appex into PlugIns/.
      - target: PacketTunnel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openrung.mobile
        PRODUCT_NAME: OpenRung
        INFOPLIST_FILE: OpenRung/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenRung/OpenRung.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        VERSIONING_SYSTEM: apple-generic
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-ObjC"
          - "-lc++"
    postBuildScripts:
      # Verbatim from the RN template pbxproj. CocoaPods appends its own [CP] phases on
      # pod install, matching the template's phase set.
      - name: Bundle React Native code and images
        shell: /bin/sh
        script: |
          set -e

          WITH_ENVIRONMENT="$REACT_NATIVE_PATH/scripts/xcode/with-environment.sh"
          REACT_NATIVE_XCODE="$REACT_NATIVE_PATH/scripts/react-native-xcode.sh"

          /bin/sh -c "\"$WITH_ENVIRONMENT\" \"$REACT_NATIVE_XCODE\""
        inputFiles:
          - "$(SRCROOT)/.xcode.env.local"
          - "$(SRCROOT)/.xcode.env"

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
      - path: Shared
    dependencies:
      # Static archive (ar) → linked, never embedded. Present locally at ios/ThirdParty/.
      - framework: ThirdParty/Libbox.xcframework
        embed: false
      - sdk: UIKit.framework
      - sdk: libresolv.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openrung.mobile.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        APPLICATION_EXTENSION_API_ONLY: "YES"

  # Hostless logic-test bundle. It compiles the units under test and their source closure directly
  # into the test module (rather than @testable-importing the app/extension), so the suites build and
  # run without the app, CocoaPods, or Libbox. Three suites live here:
  #   - FailureClassifierTests: FailureClassifier + the small error types it maps.
  #   - BrokerClientTests: the broker discovery flow (staggered race + override-first).
  #   - RelayListVerifierTests: RelayListVerifier, plus AppConfig and its compile closure
  #     (BrokerClient/RelayDescriptor/DeviceAttributes/NetworkPathMonitor/BrokerEndpoint) so the §11
  #     pinned-key CI guard verifies the committed rotation vectors against the REAL
  #     AppConfig.relaySigningKeys constant — a typo'd pin fails CI here, not on rotation day.
  # All sources are Foundation/UIKit/Network/CryptoKit only (no CocoaPods, no Libbox).
  OpenRungTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OpenRungTests
      - path: PacketTunnel/FailureClassifier.swift
      - path: PacketTunnel/PacketTunnelError.swift
      - path: PacketTunnel/PacketTunnelProxyEngineError.swift
      - path: Shared/AppConfig.swift
      - path: Shared/BrokerClient.swift
      - path: Shared/BrokerClientError.swift
      - path: Shared/BrokerEndpoint.swift
      - path: Shared/DeviceAttributes.swift
      - path: Shared/NetworkPathMonitor.swift
      - path: Shared/RelayDescriptor.swift
      - path: Shared/RelayReachabilityError.swift
      - path: Shared/RelayListVerifier.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openrung.mobile.OpenRungTests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  # Explicit so the scheme name stays `OpenRung` for the Podfile target + xcodebuild -scheme.
  OpenRung:
    build:
      targets:
        OpenRung: all
    run:
      config: Debug
    archive:
      config: Release
  OpenRungTests:
    build:
      targets:
        OpenRungTests: [test]
    test:
      config: Debug
      targets:
        - OpenRungTests
